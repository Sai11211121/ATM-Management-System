<!DOCTYPE html>

<html>

<head>

<title>ATM Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

<h1>🏦 ABC BANK ATM</h1>

<form action="/login" method="POST">

<input
type="number"
name="account_no"
placeholder="Account Number"
required>

<input
type="password"
name="pin"
placeholder="Enter PIN"
required>

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
